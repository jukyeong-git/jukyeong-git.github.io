<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukyeong Kim - GitHub Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    
    <style>
        /* 전체 레이아웃 (GitHub 라이트 모드 스타일) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #24292f;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            display: flex;
            max-width: 1280px;
            margin: 0 auto;
            gap: 32px;
        }
        
        /* 좌측 프로필 패널 */
        .profile-panel {
            width: 296px;
            flex-shrink: 0;
        }
        .profile-img-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%; /* 1:1 비율 유지 */
            margin-bottom: 16px;
        }
        .profile-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid #d0d7de;
            object-fit: cover;
            background-color: #f6f8fa;
        }
        .profile-name {
            font-size: 26px;
            font-weight: 600;
            line-height: 1.25;
            color: #24292f;
        }
        .profile-username {
            font-size: 20px;
            font-weight: 300;
            line-height: 1.2;
            color: #57606a;
            margin-bottom: 16px;
        }
        .profile-bio {
            font-size: 16px;
            color: #24292f;
            line-height: 1.5;
            margin-bottom: 16px;
            word-break: break-word;
        }
        
        /* 우측 README 콘텐츠 영역 */
        .readme-content {
            flex-grow: 1;
            min-width: 0;
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 32px;
        }

        /* 모바일 화면 대응 */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .profile-panel { width: 100%; text-align: center; }
            .profile-img-container { width: 200px; padding-bottom: 200px; margin: 0 auto 16px auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-panel">
            <div class="profile-img-container">
                <img id="profile-img" src="" alt="Profile Picture" class="profile-img">
            </div>
            <div id="profile-name" class="profile-name"></div>
            <div id="profile-username" class="profile-username"></div>
            <div id="profile-bio" class="profile-bio">Loading...</div>
        </div>

        <div class="readme-content markdown-body" id="content">
            Loading content...
        </div>
    </div>

    <script>
        const username = 'jukyeong-git';
        
        // 1. 프로필 사진, 이름, 닉네임, 소개글만 깔끔하게 가져오기
        fetch(`https://api.github.com/users/${username}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('profile-img').src = data.avatar_url;
                document.getElementById('profile-name').innerText = data.name || data.login;
                document.getElementById('profile-username').innerText = data.login;
                document.getElementById('profile-bio').innerText = data.bio || '';
            })
            .catch(error => {
                document.getElementById('profile-bio').innerText = 'Failed to load profile.';
            });

        // 2. README.md 가져오기
        fetch(`https://raw.githubusercontent.com/${username}/${username}/main/README.md`)
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = 'Failed to load content.';
            });
    </script>
</body>
</html>
